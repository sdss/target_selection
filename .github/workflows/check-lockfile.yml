name: Check lockfile

on:
  push:
    paths:
      - pyproject.toml
      - uv.lock
  pull_request:
    paths:
      - pyproject.toml
      - uv.lock

jobs:
  check-lockfile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check lockfile
        run: |
          uv lock --check
